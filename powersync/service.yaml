# Adds YAML Schema support for VSCode users with the YAML extension installed. This enables features like validation and autocompletion based on the provided schema.
# yaml-language-server: $schema=https://unpkg.com/@powersync/cli-schemas@latest/json-schema/service-config.json

# PowerSync self-hosted config – source-of-truth template with all schema options as valid YAML.
# Docs: https://docs.powersync.com/self-hosting

# [required] Service type identifier.
_type: self-hosted

# [optional] Telemetry configuration for service monitoring.
# See https://docs.powersync.com/self-hosting/telemetry
telemetry:
  # When true, disables sharing of anonymized telemetry data. Default: false.
  disable_telemetry_sharing: false

# -----------------------------------------------------------------------------
# [required] REPLICATION – configuration for data replication; array of data source connections
# Connection: `uri` and `password` are required for a complete connection. Alternatively omit `uri`
# and provide individual fields (hostname, port, database, username, password, etc.); they are used
# to construct the connection URI. For MongoDB, `uri` is required.
# -----------------------------------------------------------------------------
replication:
  connections:
    #     -------------------------------------------------------------------------
    #     PostgreSQL – uncomment this entire block to use
    #     -------------------------------------------------------------------------
    - type: postgresql
      sslmode: disable
      # [optional] Connection string (recommended). Omit and use hostname/port/database/username/password instead.
      uri: !env PS_DATA_SOURCE_URI

# -----------------------------------------------------------------------------
# Sync Storage – configuration for the storage backend. MongoDB and Postgres are supported.
# A MongoDB example is provided below.
# -----------------------------------------------------------------------------
storage:
  type: postgresql
  sslmode: disable
  uri: !env PS_STORAGE_SOURCE_URI

# -----------------------------------------------------------------------------
# SYNC CONFIG – configuration for Sync Streams/Sync Rules that define which data is synced to each user.
# -----------------------------------------------------------------------------
# One of path or content is supported. path is the most common (file reference).
sync_config:
  # Path to the sync config YAML file (sync rules).
  path: sync-config.yaml
  # # [optional] Inline sync config content as a string; use this or path, not both.
  # content: string
  # # [optional] When true, exit the process if sync config fails to parse. Default: false.
  # exit_on_error: false

  # -----------------------------------------------------------------------------
  # [optional] API – API service configuration and parameters
  # -----------------------------------------------------------------------------
api:
  # API access tokens for administrative operations (e.g. CLI link). Use a strong token in production.
  tokens:
    - dev-token-do-not-use-in-production
    - use_a_better_token_in_production
  # # [optional] Performance and safety parameters.
  # parameters:
  #  # Max connections (HTTP/websocket) per API process.
  #  max_concurrent_connections: 200
  #  # Should not exceed storage.max_pool_size.
  #  max_data_fetch_concurrency: 10
  #  # Hard limit; service errors if exceeded.
  #  max_buckets_per_connection: 1000
  #  # Limit before converting to unique set.
  #  max_parameter_query_results: 1000

  # # -----------------------------------------------------------------------------
  # # [optional] PORT – the port on which the service will listen for connections (number or string)
  # # -----------------------------------------------------------------------------
  # port: !env PS_PORT

  # # -----------------------------------------------------------------------------
  # # CLIENT AUTH (optional) – configuration for client authentication mechanisms
  # # -----------------------------------------------------------------------------
client_auth:
  # [optional] Use the same JWT secret as Supabase. Default: false.
  supabase: true
  # [optional] JWKS URL or array of URLs; instance fetches public keys to verify JWT signatures.
  jwks_uri: !env PS_JWKS_URI
  # [optional] Valid audiences for JWT validation.
  audience:
    - authenticated

  # # -----------------------------------------------------------------------------
  # # [optional] HEALTHCHECK – mechanisms for exposing health check data
  # # -----------------------------------------------------------------------------
  # healthcheck:
  #  probes:
  #    # [optional] Expose healthcheck status via filesystem files.
  #    use_filesystem: false
  #    # [optional] Expose healthcheck status via HTTP endpoints.
  #    use_http: false
  #    # [optional] Deprecated: HTTP probes for API and UNIFIED; filesystem probes are always enabled.
  #    use_legacy: false

  # # -----------------------------------------------------------------------------
  # # [optional] MIGRATIONS – configuration for database schema migrations
  # # -----------------------------------------------------------------------------
  # migrations:
  #  # When true, disables automatic storage schema migrations; start them manually. Default: false.
  #  disable_auto_migration: false
